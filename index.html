<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="preload">
    <main>
        <div class="calculator">
            <div class="container">
                <div class="result">
                    <p>0</p>
                </div>
                <div class="buttons">
                    <div class="numbers">
                        <button class="btn other" id="btn-borrar">AC</button>
                        <button class="btn other" id="btn-invertir">+/-</button>
                        <button class="btn other" id="btn-porciento">%</button>
                        <button class="btn" id="btn-siete">7</button>
                        <button class="btn" id="btn-ocho">8</button>
                        <button class="btn" id="btn-nueve">9</button>
                        <button class="btn" id="btn-cuatro">4</button>
                        <button class="btn" id="btn-cinco">5</button>
                        <button class="btn" id="btn-seis">6</button>
                        <button class="btn" id="btn-uno">1</button>
                        <button class="btn" id="btn-dos">2</button>
                        <button class="btn" id="btn-tres">3</button>
                        <button class="btn" id="btn-cero">0</button>
                        <button class="btn" id="btn-coma">,</button>
                    </div>
                    <div class="btn-operators">
                        <button class="btn operator" id="dividir">÷</button>
                        <button class="btn operator" id="multiplicar">x</button>
                        <button class="btn operator" id="restar">-</button>
                        <button class="btn operator" id="sumar">+</button>
                        <button class="btn operator" id="igual">=</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
